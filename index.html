document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}}\" style=\"background:none; border:none; color:rgba(237,239,230,.5); font-family:Geist,sans-serif; font-size:13px; cursor:pointer; padding:6px 4px;\" style-hover=\"color:#EDEFE6;\">Recomeçar<\u002Fbutton>\n  <\u002Fheader>\n\n  <main style=\"width:100%; max-width:820px; margin:0 auto; padding:56px 28px 120px; flex:1;\">\n\n    <sc-if value=\"{{ isArranque }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"1 · Arranque\" style=\"animation:plFadeUp .5s ease both;\">\n        <div style=\"display:flex; gap:14px; margin-bottom:44px;\">\n          <div style=\"padding-top:8px;\"><div style=\"width:8px; height:8px; border-radius:50%; background:#C8A86B;\"><\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#C8A86B; margin-bottom:10px;\">Ludy<\u002Fdiv>\n            <p style=\"margin:0; font-family:Fraunces,Georgia,serif; font-style:italic; font-weight:400; font-size:22px; line-height:1.55; color:#EDEFE6; max-width:56ch;\">Bom dia. Sou o Ludy. Vamos criar o assistente digital IA, secção a secção. Só 5 secções são obrigatórias.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h1 style=\"margin:0 0 10px; font-family:Fraunces,Georgia,serif; font-size:30px; font-weight:550; line-height:1.25;\">Este assistente é para uso profissional ou pessoal?<\u002Fh1>\n        <p style=\"margin:0 0 28px; font-size:15px; color:rgba(237,239,230,.55);\">A escolha ajusta o vocabulário e as secções do percurso.<\u002Fp>\n\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px;\">\n          <button onclick=\"{{ escolherProf }}\" style=\"text-align:left; background:{{ fundoProf }}; border:1px solid {{ bordaProf }}; border-radius:10px; padding:22px; cursor:pointer; color:#EDEFE6; font-family:Geist,sans-serif; display:flex; gap:14px; align-items:flex-start; transition:border-color .2s ease, background .2s ease;\" style-hover=\"border-color:#8FAA6B;\">\n            <span style=\"margin-top:3px; width:16px; height:16px; border-radius:50%; border:1.5px solid {{ aroProf }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ pontoProf }};\"><\u002Fspan><\u002Fspan>\n            <span style=\"display:block;\">\n              <span style=\"display:block; font-size:17px; font-weight:600; margin-bottom:6px;\">Uso profissional<\u002Fspan>\n              <span style=\"display:block; font-size:14px; line-height:1.55; color:rgba(237,239,230,.6);\">Para quem trabalha com clientes — um nutricionista, um advogado, um treinador.<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n          <button onclick=\"{{ escolherPess }}\" style=\"text-align:left; background:{{ fundoPess }}; border:1px solid {{ bordaPess }}; border-radius:10px; padding:22px; cursor:pointer; color:#EDEFE6; font-family:Geist,sans-serif; display:flex; gap:14px; align-items:flex-start; transition:border-color .2s ease, background .2s ease;\" style-hover=\"border-color:#8FAA6B;\">\n            <span style=\"margin-top:3px; width:16px; height:16px; border-radius:50%; border:1.5px solid {{ aroPess }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ pontoPess }};\"><\u002Fspan><\u002Fspan>\n            <span style=\"display:block;\">\n              <span style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px;\"><span style=\"font-size:17px; font-weight:600;\">Uso pessoal<\u002Fspan><span style=\"font-size:9px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:rgba(200,168,107,.9); border:1px solid rgba(200,168,107,.4); border-radius:999px; padding:2px 7px;\">Em desenvolvimento<\u002Fspan><\u002Fspan>\n              <span style=\"display:block; font-size:14px; line-height:1.55; color:rgba(237,239,230,.6);\">Para projectos da pessoa — organizar um casamento, um jardim, uma cozinha.<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ temRamo }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:30px; border-top:1px solid rgba(237,239,230,.08); padding-top:30px; animation:plFadeUp .35s ease both;\">\n            <h2 style=\"margin:0 0 6px; font-family:Fraunces,Georgia,serif; font-size:22px; font-weight:550; line-height:1.3;\">Basta descrever o caso.<\u002Fh2>\n            <p style=\"margin:0 0 16px; font-size:15px; line-height:1.6; color:rgba(237,239,230,.62);\">O assistente devolve um rascunho organizado para rever. Nada é decidido aqui.<\u002Fp>\n            <textarea rows=\"3\" value=\"{{ objectivoAtual }}\" onchange=\"{{ aoObjectivo }}\" placeholder=\"Basta escrever o objectivo em poucas palavras…\" style=\"width:100%; background:rgba(0,0,0,.28); border:1px solid rgba(237,239,230,.16); border-radius:8px; padding:14px 16px; color:#EDEFE6; font-family:Geist,sans-serif; font-size:16px; line-height:1.6; resize:vertical;\" style-focus=\"border-color:#8FAA6B; outline:none; box-shadow:0 0 0 3px rgba(143,170,107,.15);\"><\u002Ftextarea>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center;\">\n              <span style=\"font-size:12px; color:rgba(237,239,230,.4);\">Exemplos:<\u002Fspan>\n              <sc-for list=\"{{ exemplosArranque }}\" as=\"ex\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ ex.escolher }}\" style=\"background:rgba(143,170,107,.08); border:1px solid rgba(143,170,107,.28); color:rgba(237,239,230,.85); border-radius:999px; padding:6px 14px; font-family:Geist,sans-serif; font-size:13px; cursor:pointer;\" style-hover=\"border-color:#8FAA6B; background:rgba(143,170,107,.16);\">{{ ex.texto }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex; justify-content:flex-end; margin-top:32px;\">\n          <button onclick=\"{{ avancar }}\" disabled=\"{{ bloqArranque }}\" style=\"background:#8FAA6B; color:#141A10; border:none; border-radius:8px; padding:13px 32px; font-family:Geist,sans-serif; font-size:15px; font-weight:600; cursor:{{ curArranque }}; opacity:{{ opacArranque }};\" style-hover=\"background:#9CB878;\">Avançar<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:60px; padding-top:26px; border-top:1px solid rgba(237,239,230,.08);\">\n          <p style=\"margin:0; font-family:Fraunces,Georgia,serif; font-style:italic; font-size:17px; line-height:1.65; color:rgba(237,239,230,.6); max-width:60ch;\">«O profissional dita ou rascunha. O assistente devolve escrito, organizado, no estilo dele. O profissional revê e decide.»<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isTemplate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"2 · Template\" style=\"animation:plFadeUp .5s ease both;\">\n        <div style=\"display:flex; gap:14px; margin-bottom:40px;\">\n          <div style=\"padding-top:8px;\"><div style=\"width:8px; height:8px; border-radius:50%; background:#C8A86B;\"><\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#C8A86B; margin-bottom:10px;\">Ludy<\u002Fdiv>\n            <p style=\"margin:0; font-family:Fraunces,Georgia,serif; font-style:italic; font-size:21px; line-height:1.55; color:#EDEFE6; max-width:56ch;\">Um ponto de partida ajuda. Basta escolher do catálogo — ou começar do zero.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h1 style=\"margin:0 0 24px; font-family:Fraunces,Georgia,serif; font-size:28px; font-weight:550; line-height:1.25;\">Escolher um ponto de partida<\u002Fh1>\n\n        <button onclick=\"{{ escolherZero }}\" style=\"width:100%; text-align:left; background:{{ fundoZero }}; border:1px solid {{ bordaZero }}; border-radius:10px; padding:22px; cursor:pointer; color:#EDEFE6; font-family:Geist,sans-serif; display:flex; gap:14px; align-items:flex-start; margin-bottom:30px; transition:border-color .2s ease, background .2s ease;\" style-hover=\"border-color:#8FAA6B;\">\n          <span style=\"margin-top:3px; width:16px; height:16px; border-radius:50%; border:1.5px solid {{ aroZero }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ pontoZero }};\"><\u002Fspan><\u002Fspan>\n          <span style=\"display:block;\">\n            <span style=\"display:block; font-size:17px; font-weight:600; margin-bottom:6px;\">Começar do zero<\u002Fspan>\n            <span style=\"display:block; font-size:14px; line-height:1.55; color:rgba(237,239,230,.6);\">Todas as secções em branco.<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n\n        <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#8FAA6B; margin-bottom:14px;\">Catálogo<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:14px;\">\n          <sc-for list=\"{{ catalogoAtual }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ item.escolher }}\" style=\"text-align:left; background:{{ item.fundo }}; border:1px solid {{ item.borda }}; border-radius:10px; padding:20px; cursor:pointer; color:#EDEFE6; font-family:Geist,sans-serif; display:flex; gap:12px; align-items:flex-start; transition:border-color .2s ease, background .2s ease;\" style-hover=\"border-color:#8FAA6B;\">\n              <span style=\"margin-top:3px; width:16px; height:16px; border-radius:50%; border:1.5px solid {{ item.aro }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ item.ponto }};\"><\u002Fspan><\u002Fspan>\n              <span style=\"display:block;\">\n                <span style=\"display:block; font-size:16px; font-weight:600; margin-bottom:6px;\">{{ item.titulo }}<\u002Fspan>\n                <span style=\"display:block; font-size:13px; line-height:1.55; color:rgba(237,239,230,.6);\">{{ item.desc }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:space-between; margin-top:32px;\">\n          <button onclick=\"{{ voltar }}\" style=\"background:none; border:1px solid rgba(237,239,230,.22); color:#EDEFE6; border-radius:8px; padding:13px 26px; font-family:Geist,sans-serif; font-size:15px; font-weight:500; cursor:pointer;\" style-hover=\"border-color:#8FAA6B;\">Voltar<\u002Fbutton>\n          <button onclick=\"{{ avancar }}\" disabled=\"{{ bloqTemplate }}\" style=\"background:#8FAA6B; color:#141A10; border:none; border-radius:8px; padding:13px 32px; font-family:Geist,sans-serif; font-size:15px; font-weight:600; cursor:{{ curTemplate }}; opacity:{{ opacTemplate }};\" style-hover=\"background:#9CB878;\">Avançar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isRascunho }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"3 · Primeiro rascunho\" style=\"animation:plFadeUp .5s ease both;\">\n        <div style=\"display:flex; gap:14px; margin-bottom:34px;\">\n          <div style=\"padding-top:8px;\"><div style=\"width:8px; height:8px; border-radius:50%; background:#C8A86B;\"><\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#C8A86B; margin-bottom:10px;\">Ludy<\u002Fdiv>\n            <p style=\"margin:0; font-family:Fraunces,Georgia,serif; font-style:italic; font-size:21px; line-height:1.55; color:#EDEFE6; max-width:56ch;\">Eis um primeiro rascunho, organizado a partir do objectivo indicado. É uma proposta para rever — o assistente organiza, não decide.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:rgba(143,170,107,.05); border:1px solid rgba(143,170,107,.16); border-radius:12px; padding:32px;\">\n          <div style=\"display:inline-block; line-height:1.5; margin-bottom:20px; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#C8A86B; border:1px solid rgba(200,168,107,.5); background:rgba(200,168,107,.08); border-radius:999px; padding:5px 14px;\">{{ rascunhoBadge }}<\u002Fdiv>\n          <h2 style=\"margin:0 0 20px; font-family:Fraunces,Georgia,serif; font-size:25px; font-weight:550; line-height:1.3;\">{{ rascunhoTitulo }}<\u002Fh2>\n\n          <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#8FAA6B; margin-bottom:8px;\">Pedido<\u002Fdiv>\n          <p style=\"margin:0 0 24px; font-size:16px; line-height:1.6; color:rgba(237,239,230,.85);\">{{ rascunhoPedido }}<\u002Fp>\n\n          <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#8FAA6B; margin-bottom:10px;\">Pontos a desenvolver<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:24px;\">\n            <sc-for list=\"{{ rascunhoPontos }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n                <span style=\"margin-top:9px; width:6px; height:6px; border-radius:50%; background:#8FAA6B; flex-shrink:0;\"><\u002Fspan>\n                <span style=\"font-size:15px; line-height:1.55; color:rgba(237,239,230,.82);\">{{ p.t }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transfor  solid {{ tr.borda }}; border-radius:10px; padding:20px; cursor:pointer; color:#EDEFE6; font-family:Geist,sans-serif; display:flex; flex-direction:column; gap:8px; transition:border-color .2s ease, background .2s ease;\" style-hover=\"border-color:#8FAA6B;\">\n              <span style=\"display:flex; align-items:center; justify-content:space-between; gap:10px;\">\n                <span style=\"font-size:15px; font-weight:600;\">{{ tr.nome }}<\u002Fspan>\n                <span style=\"width:15px; height:15px; border-radius:50%; border:1.5px solid {{ tr.aro }}; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{ tr.ponto }};\"><\u002Fspan><\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-family:Fraunces,Georgia,serif; font-size:26px; font-weight:550;\">{{ tr.preco }}<span style=\"font-family:Geist,sans-serif; font-size:13px; font-weight:400; color:rgba(237,239,230,.5);\"> /mês<\u002Fspan><\u002Fspan>\n              <span style=\"font-size:13px; line-height:1.5; color:rgba(237,239,230,.6);\">{{ tr.desc }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:26px; border:1px solid rgba(143,170,107,.16); background:rgba(143,170,107,.04); border-radius:12px; padding:24px;\">\n          <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#8FAA6B; margin-bottom:14px;\">Confiança<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <sc-for list=\"{{ confiancaPontos }}\" as=\"cp\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n                <span style=\"margin-top:2px; color:#8FAA6B; font-size:15px; flex-shrink:0;\">✓<\u002Fspan>\n                <span style=\"font-size:15px; line-height:1.55; color:rgba(237,239,230,.82);\">{{ cp.t }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:center; margin-top:26px;\">\n          <button onclick=\"{{ trialStub }}\" style=\"background:none; border:1px solid rgba(200,168,107,.55); color:#C8A86B; border-radius:8px; padding:13px 30px; font-family:Geist,sans-serif; font-size:15px; font-weight:600; cursor:pointer; white-space:nowrap;\" style-hover=\"background:rgba(200,168,107,.08);\">Iniciar período de 15 dias — em breve<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex; justify-content:space-between; margin-top:32px;\">\n          <button onclick=\"{{ voltar }}\" style=\"background:none; border:1px solid rgba(237,239,230,.22); color:#EDEFE6; border-radius:8px; padding:13px 26px; font-family:Geist,sans-serif; font-size:15px; font-weight:500; cursor:pointer;\" style-hover=\"border-color:#8FAA6B;\">Voltar<\u002Fbutton>\n          <button onclick=\"{{ avancar }}\" style=\"background:#8FAA6B; color:#141A10; border:none; border-radius:8px; padding:13px 32px; font-family:Geist,sans-serif; font-size:15px; font-weight:600; cursor:pointer;\" style-hover=\"background:#9CB878;\">Concluir<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isConcluido }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"7 · Concluído\" style=\"text-align:center; padding-top:24px; animation:plFadeUp .5s ease both;\">\n        <div style=\"width:64px; height:64px; border-radius:50%; border:1.5px solid #8FAA6B; color:#8FAA6B; font-size:26px; line-height:62px; margin:0 auto 32px;\">✓<\u002Fdiv>\n        <div style=\"font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:#C8A86B; margin-bottom:14px;\">Ludy<\u002Fdiv>\n        <p style=\"margin:0 auto; font-family:Fraunces,Georgia,serif; font-style:italic; font-size:24px; line-height:1.55; color:#EDEFE6; max-width:44ch;\">{{ ludyFecho }}<\u002Fp>\n        <h2 style=\"margin:44px 0 6px; font-family:Fraunces,Georgia,serif; font-size:30px; font-weight:550;\">{{ nomeMostrar }}<\u002Fh2>\n        <p style=\"margin:0; font-size:14px; color:rgba(237,239,230,.55);\">{{ metaResumo }}<\u002Fp>\n        <div style=\"display:flex; justify-content:center; align-items:center; gap:24px; margin-top:38px;\">\n          <button onclick=\"{{ avisoBreve }}\" style=\"background:none; border:none; color:rgba(237,239,230,.5); font-family:Geist,sans-serif; font-size:13px; cursor:pointer; text-decoration:underline dotted; text-underline-offset:4px; padding:4px;\" style-hover=\"color:#C8A86B;\">Descarregar<\u002Fbutton>\n          <button onclick=\"{{ recomecar }}\" style=\"background:#8FAA6B; color:#141A10; border:none; border-radius:8px; padding:13px 32px; font-family:Geist,sans-serif; font-size:15px; font-weight:600; cursor:pointer;\" style-hover=\"background:#9CB878;\">Criar outro assistente digital IA<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <sc-if value=\"{{ toastVisivel }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; left:50%; bottom:32px; transform:translateX(-50%); background:#1C2415; border:1px solid rgba(200,168,107,.5); color:#EDEFE6; border-radius:8px; padding:12px 22px; font-size:14px; font-family:Geist,sans-serif; box-shadow:0 12px 32px rgba(0,0,0,.4); z-index:50;\">{{ toastTexto }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;ecraInicial&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;arranque&quot;, &quot;template&quot;, &quot;rascunho&quot;, &quot;seccoes&quot;, &quot;output&quot;, &quot;pagamento&quot;, &quot;concluido&quot;], &quot;default&quot;: &quot;arranque&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demonstração&quot; },\n  &quot;ramoDemo&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;profissional&quot;, &quot;pessoal&quot;], &quot;default&quot;: &quot;profissional&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demonstração&quot; },\n  &quot;mostrarExemplos&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Conteúdo&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.CHAVE = 'pl-criar-wizard-v1';\n\n    this.SECCOES = [\n      { id: 's1',  bloco: 1, titulo: 'Nome e propósito', obrig: true,  pergunta: 'Como se chama o assistente? Para que serve?', exemplo: 'Ex.: «O meu Assistente». Serve para transformar notas e ditados em textos organizados, no estilo do profissional. Não decide nada.' },\n      { id: 's2',  bloco: 1, titulo: 'Missão', obrig: true,  pergunta: 'Qual é o objectivo maior?', exemplo: 'Ex.: Poupar tempo na escrita repetitiva. O tempo ganho volta para o que só a pessoa pode fazer.' },\n      { id: 's3',  bloco: 1, titulo: 'Público-alvo', obrig: false, pergunta: 'Com quem fala? Idade, literacia?', exemplo: 'Ex.: um nutricionista poderia indicar «clientes adultos, com pouca familiaridade com termos técnicos».' },\n      { id: 's4',  bloco: 1, titulo: 'Contexto', obrig: false, pergunta: 'Em que ambiente trabalha?', exemplo: 'Ex.: um treinador poderia indicar «ginásio de bairro, público de todas as idades».' },\n      { id: 's5',  bloco: 2, titulo: 'Voz e tom', obrig: false, pergunta: 'Formal ou próximo? Sério ou leve?', exemplo: 'Ex.: «Próximo mas rigoroso». O assistente imita o estilo do profissional, não inventa um.' },\n      { id: 's6',  bloco: 2, titulo: 'Linguagem', obrig: false, pergunta: 'Que palavras usa? Explica termos técnicos? Trabalha sempre em português, ou às vezes precisa de outra língua?', exemplo: 'Ex.: «Linguagem simples; termos técnicos explicados por comparação. Escreve em português; alguns clientes estrangeiros pedem inglês».' },\n      { id: 's7',  bloco: 2, titulo: 'Estilo de resposta', obrig: false, pergunta: 'Textos longos ou curtos? Listas? Emojis? Precisa de formato fácil de ler em voz alta, ou com frases simples? Quer ser avisado se um rascunho sair muito mais longo ou muito mais curto do que é habitual?', exemplo: 'Ex.: «Curto primeiro, detalhe só se pedido. Sem emojis decorativos. Alguns clientes preferem frases curtas, fáceis de ler em voz alta. Avisar se o texto sair fora do tamanho habitual».' },\n      { id: 's8',  bloco: 3, titulo: 'Onboarding', obrig: false, pergunta: 'Como começa a primeira interação?', exemplo: 'Ex.: «1) O que precisa de escrever? 2) Tem rascunho ou ditado? 3) Para quem é?»' },\n      { id: 's9',  bloco: 3, titulo: 'Modos de utilização', obrig: false, pergunta: 'O assistente responde sempre da mesma forma, ou muda consoante a situação? Tem um modo \"rápido\" para quando está com pressa — sem perguntas, só organiza o mínimo?', exemplo: 'Ex.: «Registo rápido para notas pessoais: telegráfico. Registo formal para documentos a entregar: completo e revisto. Modo rápido: transcreve e organiza sem perguntas extra, para quando não há tempo».' },\n      { id: 's10', bloco: 3, titulo: 'Tarefas específicas', obrig: false, pergunta: 'Que fluxos conhece? Se o profissional mudar de ideias a meio, reescreve tudo ou só o trecho indicado? Quer guardar versões anteriores do mesmo rascunho, para comparar?', exemplo: 'Ex.: «Passar um ditado a texto estruturado; organizar notas por temas. Se pedido, corrige só o trecho indicado — não reescreve o resto. Mantém a versão anterior visível, para comparar antes de substituir». Tudo parte de material que o profissional já produziu.' },\n      { id: 's11', bloco: 3, titulo: 'Fontes oficiais', obrig: false, soProf: true, pergunta: 'Em que informação se apoia?', exemplo: 'Ex.: «Apenas nos documentos fornecidos pelo profissional. Não recorre a fontes externas não autorizadas».' },\n      { id: 's12', bloco: 3, titulo: 'Conhecimento fixo', obrig: false, pergunta: 'Que dados precisa de ter sempre presentes? Que formato de entrada usa, e como prefere receber o resultado final? Tem um glossário ou termos próprios? Assina sempre com nome e contacto, ou só nalguns casos? Há dados que mudam com frequência (preços, morada, horários) e o assistente deve confirmar em vez de assumir? Há frases ou fórmulas que nunca quer que o assistente use?', exemplo: 'Ex.: «Nome do profissional, contactos, modelos habituais. Entrada: notas ditadas. Saída: texto pronto a copiar, ou já preenchido no email/WhatsApp para rever e enviar. Termos próprios: sempre por extenso na primeira menção. Assinatura: só em documentos formais. Horários e preços mudam todos os meses — o assistente pergunta em vez de presumir os antigos. Nunca usar: \"garantido\", \"sem falhas\", \"100%\"».' },\n      { id: 's13', bloco: 4, titulo: 'Red lines · o que nunca faz', obrig: true,  pergunta: 'Que linhas nunca pode cruzar?', exemplo: 'Ex.: «Nunca decide pelo profissional. Nunca gera conteúdo que não parta de um rascunho ou ditado. O profissional revê e decide sempre».' },\n      { id: 's14', bloco: 4, titulo: 'Situações-limite', obrig: true,  pergunta: 'Que situações exigem parar e reencaminhar? E quando falta informação para completar o texto — pergunta, ou assume e sinaliza como suposição?', exemplo: 'Ex.: «Perante um pedido que exija uma decisão, o assistente pára e devolve ao profissional. Se faltar informação, assinala claramente \"suposição — confirmar\" em vez de inventar».' },\n      { id: 's15', bloco: 4, titulo: 'Tratamento de dados', obrig: false, pergunta: 'Que dados aceita? Quais recusa (RGPD)? Deve confirmar sempre o género (ele/ela) de quem é mencionado no texto, em vez de assumir?', exemplo: 'Ex.: «Aceita iniciais + idade. Se surgir nome completo, sugere iniciais. Não guarda dados após dar forma. Se o género não for claro pelo nome, pergunta em vez de assumir».' },\n      { id: 's16', bloco: 4, titulo: 'Fecho dinâmico', obrig: true,  pergunta: 'Como termina cada interação?', exemplo: 'Ex.: «Devolve o texto e lembra: Pronto a rever. O profissional decide o que fica».' },\n      { id: 's17', bloco: 4, titulo: 'Continuidade', obrig: false, pergunta: 'Como liga uma interação à seguinte? Se notar um padrão que se repete, pode sugerir guardá-lo como preferência — mas só grava se o profissional confirmar?', exemplo: 'Ex.: «Pergunta se há algo a retomar. Se notar que o profissional pede sempre o mesmo ajuste, sugere: \"Quer guardar isto como preferência?\" — só grava depois de confirmado. Nunca guarda dados pessoais de clientes».' }\n    ];\n\n    this.BLOCOS = { 1: 'Identidade', 2: 'Personalidade', 3: 'Funcionamento', 4: 'Segurança e fecho' };\n    this.LUDY_BLOCO = {\n      1: 'Primeiro, a identidade. Quem é o assistente digital IA e para que serve.',\n      2: 'Agora, a personalidade. Como fala, que palavras usa. Estas secções são opcionais.',\n      3: 'O funcionamento no dia a dia. Tudo opcional — pode ser saltado.',\n      4: 'Por fim, a segurança. As regras que o assistente nunca cruza.'\n    };\n\n    this.CATALOGO = {\n      profissional: [\n        { id: 'nutricionista', titulo: 'Nutricionista', desc: 'Clientes adultos, com pouca familiaridade com termos técnicos.' },\n        { id: 'advogado', titulo: 'Advogado', desc: 'Rascunhos e ditados passados a texto organizado.' },\n        { id: 'treinador', titulo: 'Treinador', desc: 'Ginásio de bairro, público de todas as idades.' }\n      ],\n      pessoal: [\n        { id: 'casamento', titulo: 'Casamento', desc: 'Organizar um casamento.' },\n        { id: 'jardim', titulo: 'Jardim', desc: 'Organizar um jardim.' },\n        { id: 'cozinha', titulo: 'Cozinha', desc: 'Organizar uma cozinha.' }\n      ]\n    };\n    this.TPL_ROTULOS = { zero: 'Começar do zero', nutricionista: 'Nutricionista', advogado: 'Advogado', treinador: 'Treinador', casamento: 'Casamento', jardim: 'Jardim', cozinha: 'Cozinha' };\n\n    const base = { ecra: 'arranque', ramo: null, tpl: null, idx: 0, nome: '', resp: {}, objectivo: '', email: '', emailErro: '', plano: null, toast: null };\n    let s = base;\n    try {\n      const g = JSON.parse(localStorage.getItem(this.CHAVE));\n      if (g && g.ecra) s = Object.assign({}, base, g, { toast: null, emailErro: '' });\n    } catch (e) {}\n    const alvo = props.ecraInicial ?? 'arranque';\n    if (alvo !== 'arranque') s = Object.assign({}, s, { ecra: alvo, ramo: s.ramo || (props.ramoDemo ?? 'profissional') });\n    this.state = s;\n    this._t = null;\n  }\n\n  guardar(patch) {\n    this.setState(patch, () => {\n      try {\n        const copia = Object.assign({}, this.state);\n        delete copia.toast;\n        localStorage.setItem(this.CHAVE, JSON.stringify(copia));\n      } catch (e) {}\n    });\n  }\n\n  visiveis() {\n    const pess = this.state.ramo === 'pessoal';\n    return this.SECCOES.filter((s) => !(pess && s.soProf));\n  }\n\n  seccaoAtual() {\n    const v = this.visiveis();\n    const idx = Math.min(this.state.idx, v.length - 1);\n    return { v: v, idx: idx, sec: v[idx] };\n  }\n\n  preenchida(sec) {\n    const r = (this.state.resp[sec.id] || '').trim();\n    if (sec.id === 's1') return ((this.state.nome || '').trim() + r).length > 0;\n    return r.length > 0;\n  }\n\n  avancar() {\n    const st = this.state;\n    if (st.ecra === 'arranque') { if (st.ramo) this.guardar({ ecra: 'template' }); }\n    else if (st.ecra === 'template') { if (st.tpl) this.guardar({ ecra: 'rascunho' }); }\n    else if (st.ecra === 'rascunho') this.guardar({ ecra: 'seccoes', idx: 0 });\n    else if (st.ecra === 'seccoes') {\n      const a = this.seccaoAtual();\n      if (a.sec.obrig && !this.preenchida(a.sec)) return;\n      if (a.idx >= a.v.length - 1) this.guardar({ ecra: 'output' });\n      else this.guardar({ idx: a.idx + 1 });\n    }\n    else if (st.ecra === 'output') this.guardar({ ecra: 'pagamento' });\n    else if (st.ecra === 'pagamento') this.guardar({ ecra: 'concluido' });\n  }\n\n  voltar() {\n    const st = this.state;\n    if (st.ecra === 'template') this.guardar({ ecra: 'arranque' });\n    else if (st.ecra === 'rascunho') this.guardar({ ecra: 'template' });\n    else if (st.ecra === 'seccoes') {\n      const a = this.seccaoAtual();\n      if (a.idx <= 0) this.guardar({ ecra: 'rascunho' });\n      else this.guardar({ idx: a.idx - 1 });\n    }\n    else if (st.ecra === 'output') this.guardar({ ecra: 'seccoes', idx: this.visiveis().length - 1 });\n    else if (st.ecra === 'pagamento') this.guardar({ ecra: 'output' });\n  }\n\n  recomecar() {\n    this.guardar({ ecra: 'arranque', ramo: null, tpl: null, idx: 0, nome: '', resp: {}, objectivo: '', email: '', emailErro: '', plano: null, toast: null });\n  }\n\n  toastMsg(msg) {\n    if (this._t) clearTimeout(this._t);\n    this.setState({ toast: msg });\n    this._t = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n\n  componentWillUnmount() { if (this._t) clearTimeout(this._t); }\n\n  componentDidUpdate(prevProps) {\n    const e = this.props.ecraInicial ?? 'arranque';\n    const pe = prevProps.ecraInicial ?? 'arranque';\n    if (pe !== e) {\n      this.guardar({ ecra: e, ramo: this.state.ramo || (this.props.ramoDemo ?? 'profissional'), idx: 0 });\n    } else if ((prevProps.ramoDemo ?? 'profissional') !== (this.props.ramoDemo ?? 'profissional') && e !== 'arranque') {\n      this.guardar({ ramo: this.props.ramoDemo ?? 'profissional', idx: 0 });\n    }\n  }\n\n  detectarNome(t) {\n    if (!t) return null;\n    const STOP = new Set(['Assistente', 'IA', 'RGPD', 'Ex', 'Ludy', 'Bloco', 'Nunca', 'Sempre', 'Não', 'Sim', 'Serve', 'Para', 'Registo', 'Linguagem', 'Curto', 'Sem', 'Apenas', 'Tudo', 'Nada', 'Pronto', 'Pronta', 'Devolve', 'Aceita', 'Pergunta', 'Perante', 'Passar', 'Organizar', 'Tem', 'Que', 'Como', 'Quais', 'Meu', 'Minha', 'Proteína', 'Lúdica']);\n    const re = /([A-ZÁÀÂÃÉÊÍÓÔÕÚÇ][a-záàâãéêíóôõúç]{2,})\\s+(?:d[aoe]s?\\s+)?([A-ZÁÀÂÃÉÊÍÓÔÕÚÇ][a-záàâãéêíóôõúç]{2,})/g;\n    let m;\n    while ((m = re.exec(t))) {\n      if (!STOP.has(m[1]) && !STOP.has(m[2])) return { completo: m[1] + ' ' + m[2], iniciais: m[1][0] + '.' + m[2][0] + '.' };\n    }\n    return null;\n  }\n\n  renderVals() {\n    const st = this.state;\n    const a = this.seccaoAtual();\n    const sec = a.sec;\n    const vis = a.v;\n    const idx = a.idx;\n\n    const respAtual = st.resp[sec.id] || '';\n    const cheia = this.preenchida(sec);\n    const bloqSec = !!sec.obrig && !cheia;\n\n    const det = this.detectarNome(sec.id === 's1' ? (st.nome || '') + ' ' + respAtual : respAtual);\n\n    const selCard = (on) => ({\n      borda: on ? '#8FAA6B' : 'rgba(237,239,230,.14)',\n      fundo: on ? 'rgba(143,170,107,.10)' : 'rgba(143,170,107,.04)',\n      aro: on ? '#8FAA6B' : 'rgba(237,239,230,.35)',\n      ponto: on ? '#8FAA6B' : 'transparent'\n    });\n    const prof = selCard(st.ramo === 'profissional');\n    const pess = selCard(st.ramo === 'pessoal');\n    const zero = selCard(st.tpl === 'zero');\n\n    const catalogo = (this.CATALOGO[st.ramo] || this.CATALOGO.profissional).map((it) => {\n      const s2 = selCard(st.tpl === it.id);\n      return Object.assign({}, it, s2, { escolher: () => this.guardar({ tpl: it.id }) });\n    });\n\n    const ramoPess = st.ramo === 'pessoal';\n    const vocab = ramoPess ? 'A pessoa' : 'O profissional';\n    const ator = ramoPess ? 'a pessoa' : 'o profissional';\n    const deAtor = ramoPess ? 'da pessoa' : 'do profissional';\n    const porAtor = ramoPess ? 'pela pessoa' : 'pelo profissional';\n    const unidCli = ramoPess ? 'projecto' : 'cliente';\n\n    const nome = (st.nome || '').trim();\n    const nomeMostrar = nome || 'O meu Assistente';\n    const ramoRotulo = ramoPess ? 'Uso pessoal' : 'Uso profissional';\n    const metaResumo = ramoRotulo + ' · Ponto de partida: ' + (this.TPL_ROTULOS[st.tpl] || '—');\n\n    const resumoBlocos = [];\n    vis.forEach((s, i) => {\n      let b = resumoBlocos.find((x) => x.n === s.bloco);\n      if (!b) { b = { n: s.bloco, rotulo: 'Bloco ' + s.bloco + ' · ' + this.BLOCOS[s.bloco], linhas: [] }; resumoBlocos.push(b); }\n      let txt = (st.resp[s.id] || '').trim();\n      if (s.id === 's1') txt = [nome ? '«' + nome + '»' : '', txt].filter(Boolean).join(' — ');\n      let cor = '#E4E8DA', fs = 'normal';\n      if (!txt) {\n        if (s.obrig) { txt = 'Obrigatória — por preencher'; cor = 'rgba(200,168,107,.8)'; }\n        else { txt = 'Secção saltada'; cor = 'rgba(237,239,230,.35)'; }\n        fs = 'italic';\n      }\n      b.linhas.push({ titulo: (i + 1) + ' · ' + s.titulo, texto: txt, cor: cor, fs: fs });\n    });\n\n    // ---- arranque: exemplos de objectivo (neutros por ramo) ----\n    const exemplosArranque = (ramoPess\n      ? ['Organizar um casamento', 'Planear um jardim', 'Arrumar uma cozinha']\n      : ['Preparar uma proposta', 'Organizar notas de uma reunião', 'Redigir uma resposta a um pedido']\n    ).map((t) => ({ texto: t, escolher: () => this.guardar({ objectivo: t }) }));\n\n    // ---- primeiro rascunho: esboço organizado a partir do objectivo ----\n    const capitalizar = (x) => (x ? x.charAt(0).toUpperCase() + x.slice(1) : x);\n    const objLimpo = (st.objectivo || '').trim();\n    const temObj = objLimpo.length > 0;\n    const pedidoBase = temObj ? objLimpo : (ramoPess\n      ? 'Organizar as notas de um projecto pessoal.'\n      : 'Preparar um texto a partir de notas do profissional.');\n    let frags = objLimpo.split(/[.;,\\n]|\\s+e\\s+/i).map((f) => f.trim()).filter((f) => f.length > 2);\n    if (frags.length < 2) frags = ramoPess\n      ? ['Contexto do projecto', 'Ponto principal a incluir', 'Resultado pretendido']\n      : ['Contexto do pedido', 'Ponto principal a incluir', 'Resultado pretendido'];\n    const rascunhoPontos = frags.slice(0, 5).map((f) => ({ t: capitalizar(f) }));\n    const palavras = pedidoBase.split(/\\s+/);\n    let tituloR = capitalizar(palavras.slice(0, 7).join(' '));\n    if (palavras.length > 7) tituloR += '…';\n    const rascunhoEstrutura = [\n      { t: 'Abertura — enquadra o pedido em duas linhas.' },\n      { t: 'Desenvolvimento — os pontos acima, por ordem.' },\n      { t: 'Fecho — o que fica a rever e a decidir ' + porAtor + '.' }\n    ];\n\n    // ---- capacidade: planos e confiança ----\n    const tiers = [\n      { id: 'gratuito', nome: 'Gratuito', preco: '0 €', desc: 'Para experimentar. Poucos rascunhos por mês.' },\n      { id: 'base', nome: 'Base', preco: '19 €', desc: 'Uso regular. Mais rascunhos e revisões por mês.' },\n      { id: 'avancado', nome: 'Avançado', preco: '49 €', desc: 'Uso intenso. Volume alargado de rascunhos e revisões.' },\n      { id: 'equipa', nome: ramoPess ? 'Vários projectos' : 'Vários profissionais', preco: '290 €', desc: 'Capacidade partilhada, com isolamento de dados por ' + unidCli + '.' }\n    ].map((tr) => {\n      const sc = selCard(st.plano === tr.id);\n      return Object.assign({}, tr, sc, { escolher: () => this.guardar({ plano: tr.id }) });\n    });\n    const confiancaPontos = [\n      { t: 'Cada saída é uma proposta que ' + ator + ' revê e valida.' },\n      { t: 'Isolamento de dados por ' + unidCli + '.' },\n      { t: 'O assistente organiza e devolve escrito. Não executa nem decide.' },\n      { t: 'Pode receber um resumo semanal de quantos rascunhos fez, se preferir — nunca automático por defeito.' }\n    ];\n\n    return {\n      isArranque: st.ecra === 'arranque',\n      isTemplate: st.ecra === 'template',\n      isRascunho: st.ecra === 'rascunho',\n      isSeccoes: st.ecra === 'seccoes',\n      isOutput: st.ecra === 'output',\n      isPagamento: st.ecra === 'pagamento',\n      isConcluido: st.ecra === 'concluido',\n\n      recomecar: () => this.recomecar(),\n      avancar: () => this.avancar(),\n      voltar: () => this.voltar(),\n      avisoBreve: () => this.toastMsg('Disponível em breve.'),\n      trialStub: () => this.toastMsg('O período de 15 dias ficará disponível em breve.'),\n\n      escolherProf: () => this.guardar({ ramo: 'profissional' }),\n      escolherPess: () => this.guardar({ ramo: 'pessoal' }),\n      temRamo: !!st.ramo,\n      fundoProf: prof.fundo, bordaProf: prof.borda, aroProf: prof.aro, pontoProf: prof.ponto,\n      fundoPess: pess.fundo, bordaPess: pess.borda, aroPess: pess.aro, pontoPess: pess.ponto,\n      bloqArranque: !st.ramo,\n      opacArranque: st.ramo ? '1' : '.45',\n      curArranque: st.ramo ? 'pointer' : 'not-allowed',\n      objectivoAtual: st.objectivo || '',\n      aoObjectivo: (e) => this.guardar({ objectivo: e.target.value }),\n      exemplosArranque: exemplosArranque,\n\n      escolherZero: () => this.guardar({ tpl: 'zero' }),\n      fundoZero: zero.fundo, bordaZero: zero.borda, aroZero: zero.aro, pontoZero: zero.ponto,\n      catalogoAtual: catalogo,\n      bloqTemplate: !st.tpl,\n      opacTemplate: st.tpl ? '1' : '.45',\n      curTemplate: st.tpl ? 'pointer' : 'not-allowed',\n\n      rascunhoBadge: 'Rascunho para ' + ator + ' editar e aprovar',\n      rascunhoTitulo: tituloR,\n      rascunhoPedido: pedidoBase,\n      rascunhoPontos: rascunhoPontos,\n      rascunhoEstrutura: rascunhoEstrutura,\n      rascunhoNota: 'O assistente organizou o pedido em pontos, para rever. Não escreveu conteúdo novo nem decidiu nada — ' + ator + ' edita e aprova.',\n      emailAtual: st.email || '',\n      aoEmail: (e) => this.guardar({ email: e.target.value, emailErro: '' }),\n      guardarEmail: () => {\n        const em = (this.state.email || '').trim();\n        if (!em) { this.toastMsg('Basta indicar um email para guardar.'); return; }\n        if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(em)) { this.setState({ emailErro: '1' }); return; }\n        this.setState({ emailErro: '' });\n        this.toastMsg('Rascunho guardado para revisão.');\n      },\n      temEmailErro: !!st.emailErro,\n      bordaEmail: st.emailErro ? '#D98A6B' : 'rgba(237,239,230,.16)',\n\n      secTitulo: sec.titulo,\n      secPergunta: sec.pergunta,\n      secExemplo: sec.exemplo,\n      temExemplo: (this.props.mostrarExemplos ?? true) && !!sec.exemplo,\n      blocoRotulo: 'Bloco ' + sec.bloco + ' · ' + this.BLOCOS[sec.bloco],\n      ludyBloco: this.LUDY_BLOCO[sec.bloco],\n      numSec: idx + 1,\n      totalSec: vis.length,\n      progresso: (((idx + 1) / vis.length) * 100).toFixed(1) + '%',\n      eObrig: !!sec.obrig,\n      eOpcional: !sec.obrig,\n      isSecUm: sec.id === 's1',\n      nomeAssist: st.nome || '',\n      aoNome: (e) => this.guardar({ nome: e.target.value }),\n      respostaAtual: respAtual,\n      aoResposta: (e) => {\n        const r = Object.assign({}, this.state.resp);\n        r[sec.id] = e.target.value;\n        this.guardar({ resp: r });\n      },\n      usarExemplo: () => {\n        const ex = (sec.exemplo || '').replace(/^Ex\\.:\\s*/, '');\n        const r = Object.assign({}, this.state.resp);\n        r[sec.id] = ex;\n        this.guardar({ resp: r });\n      },\n      rgpdVisivel: !!det,\n      rgpdTexto: det ? 'Parece haver um nome completo («' + det.completo + '»). Sugere-se substituir por iniciais e idade — por exemplo «' + det.iniciais + ', 62a». O texto pode ficar como está; é apenas uma sugestão.' : '',\n      mostrarDicaObrig: bloqSec,\n      bloqSec: bloqSec,\n      opacSec: bloqSec ? '.45' : '1',\n      curSec: bloqSec ? 'not-allowed' : 'pointer',\n      rotuloAvancar: (!sec.obrig && !cheia) ? 'Saltar secção' : 'Avançar',\n\n      nomeMostrar: nomeMostrar,\n      metaResumo: metaResumo,\n      resumoBlocos: resumoBlocos,\n      volumeNota: 'Cada plano define quantos rascunhos e revisões por mês. Para rascunhar mais, é preciso mais capacidade. Uso diário costuma precisar de mais capacidade do que uso ocasional. Nenhum plano faz o assistente decidir — a decisão é sempre ' + deAtor + '.',\n      tiersLista: tiers,\n      confiancaPontos: confiancaPontos,\n      ludyFecho: 'Está pronto. O assistente foi criado no estilo indicado. ' + vocab + ' revê e decide sempre.',\n\n      toastVisivel: !!st.toast,\n      toastTexto: st.toast || ''\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
